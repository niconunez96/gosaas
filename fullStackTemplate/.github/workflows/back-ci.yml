name: Back CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "back/**"
      - "Justfile"
      - ".github/workflows/back-ci.yml"

jobs:
  back-check:
    name: Backend validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: back/go.mod
          cache-dependency-path: back/go.sum

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install golangci-lint
        run: |
          mkdir -p "$HOME/.local/bin"
          GOBIN="$HOME/.local/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run backend CI checks
        run: just back-check
